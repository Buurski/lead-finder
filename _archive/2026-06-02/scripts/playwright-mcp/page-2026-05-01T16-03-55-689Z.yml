hasLogo\\\":\\\"Ja — logo fundet på hjemmeside/Google Maps\\\"},\\\"type\\\":\\\"deep\\\"}\",\"email\":\"\",\"emailSentAt\":\"\",\"emailOpenedAt\":\"\",\"emailClickedAt\":\"\",\"emailStatus\":\"\",\"followupSentAt\":\"\"},{\"id\":\"4\",\"name\":\"Tømrerkompagniet Aps\",\"branch\":\"Tømrer\",\"phone\":\"+45 20 45 68 61\",\"city\":\"Ikast\",\"score\":75,\"source\":\"Google Maps\",\"website\":\"http://www.tomrerkompagniet.dk/\",\"websiteStatus\":\"ok\",\"status\":\"client\",\"notes\":\"\",\"lastUpdated\":\"2026-04-28T23:22:14.584Z\",\"websiteQualityTier\":\"old\",\"enrichedInfo\":\"{\\\"fetchedAt\\\":\\\"2026-04-28T23:40:10.925Z\\\",\\\"businessName\\\":\\\"Tømrerkompagniet Aps\\\",\\\"branch\\\":\\\"Tømrer\\\",\\\"city\\\":\\\"Ikast\\\",\\\"website\\\":\\\"http://www.tomrerkompagniet.dk/\\\",\\\"websitePages\\\":[{\\\"url\\\":\\\"http://www.tomrerkompagniet.dk/\\\",\\\"title\\\":\\\"\\\",\\\"text\\\":\\\"Tømrerkompagniet ApS\\\\nTømrerkompagniet er en mindre virksomhed, der hele tiden har kunden i fokus. Vi påtager os enhver byggeopgave - intet er hverken for stort eller småt.\\\\nVi leverer et veludført arbejde til den aftalte tid og til konkurrencedygtige priser.\\\\nVi håber, at hjemmesiden kan hjælpe dig med at finde inspiration og svar på dine spørgsmål.\\\\nDu er selvfølgelig velkommen til at ringe eller sende en e-mail til os.\\\\nVi glæder os til at høre fra dig!\\\\nVi udfører alle former for om- og tilbygninger.\\\\nVi hjælper dig med:\\\\nTømrer- og snedkerarbejde\\\\nNybygning\\\\nOmbygning\\\\nBygnings- og tag- renoveringer\\\\nHovedentrepriser\\\\nRestaurering\\\\nVinduer og døre\\\\nVedligeholdelse\\\"},{\\\"url\\\":\\\"http://www.tomrerkompagniet.dk/profil/\\\",\\\"title\\\":\\\"\\\",\\\"text\\\":\\\"PROFIL\\\\nTømrerkompagniet I/S blev etableret i 2005 af Brian Lønborg Poulsen og Thomas Johansen og blev omdannet til ApS i November 2008.\\\\nI starten havde vi til huse i lokaler i Brian Poulsens privatbolig, og senere på Eli Christensens Vej 45, men det blev for trangt hen af vejen.\\\\nBrian og Thomas er barndomsvenner, og har mere eller mindre arbejdet side om side i 25 år. De er begge udlært i det samme firma, hvor de har arbejdet sammen indtil Tømrerkompagniets start.\\\\nDe ser dette som en fordel, da de har samme syn på kvalitet, service og arbejdsmoral. Desuden kender de hinandens styrker og svagheder til mindste detalje. Det betyder at de kan supplere hinanden og derved ALTID nå det bedste resultat.\\\"},{\\\"url\\\":\\\"http://www.tomrerkompagniet.dk/malsaetning/\\\",\\\"title\\\":\\\"\\\",\\\"text\\\":\\\"MÅLSÆTNING\\\\nHelt fra det tidspunkt drømmen om eget firma blev skabt hos Thomas og Brian, har det stået klart, at det ikke bare skulle være endnu et tømrerfirma.\\\\nAlle tømrer kan rejse spær, lægge tage, sætte vinduer og døre i osv. Det er nøjagtig det samme som Tømrerkompagniet kan.\\\\nMen de vil noget mere. Kunden skal have en totaloplevelse hos Tømrerkompagniet. Thomas og Brian siger om Tømrerkompagniet. Vi ønsker vores firma skal skille sig ud fra andre, på tre specifikke punkter.\\\\nBedre kvalitet\\\\nHøjere serviceniveau\\\\nstærkere commitment mellem firmaet og kunden.\\\\nDet betyder at alle vores kunder kan være sikre på at når vi sætter tid af til dem, så har vi fuld fokus på deres projekt. Vi garanterer, at vores arbejde er kvalitetsmæssigt i top. Vores kunder kan være sikre på at tidsplanen bliver fuldt, og arbejdsstedet bliver forladt i ordentlig stand.\\\\nMange kunder tror det er en selvfølge, men alt for tit bliver de skuffede. Vi ønsker at sætte prikken over i'et og yde den ekstra indsats, så alle parter er tilfredse.\\\"},{\\\"url\\\":\\\"http://www.tomrerkompagniet.dk/galleri/\\\",\\\"title\\\":\\\"\\\",\\\"text\\\":\\\"GALLERI\\\"},{\\\"url\\\":\\\"http://www.tomrerkompagniet.dk/galleri/ny-tagetage/\\\",\\\"title\\\":\\\"\\\",\\\"text\\\":\\\"NY TAGETAGE\\\\nNy tagetage 1\\\\nNy tagetage 2\\\\nNy tagetage 3\\\\nNy tagetage 4\\\\nNy tagetage 5\\\\nNy tagetage 6\\\\nNy tagetage 7\\\\nNy tagetage 8\\\\nNy tagetage 9\\\\nNy tagetage 10\\\\nNy tagetage 11\\\\nNy tagetage 12\\\\nNy tagetage 13\\\\nNy tagetage 14\\\\nNy tagetage 15\\\"},{\\\"url\\\":\\\"http://www.tomrerkompagniet.dk/galleri/renovering-af-tag/\\\",\\\"title\\\":\\\"\\\",\\\"text\\\":\\\"RENOVERING AF TAG\\\\nRenovering af tag 1\\\\nRenovering af tag 2\\\\nRenovering af tag 3\\\\nRenovering af tag 4\\\"},{\\\"url\\\":\\\"http://www.tomrerkompagniet.dk/galleri/nyt-renovationshus/\\\",\\\"title\\\":\\\"\\\",\\\"text\\\":\\\"NYT RENOVATIONSHUS\\\\nNyt renovationshus 1\\\\nNyt renovationshus 2\\\\nNyt renovationshus 3\\\\nNyt renovationshus 4\\\"},{\\\"url\\\":\\\"http://www.tomrerkompagniet.dk/galleri/renovering-tag/\\\",\\\"title\\\":\\\"\\\",\\\"text\\\":\\\"RENOVERING TAG\\\\nRenovering af tag 1\\\\nRenovering af tag 2\\\"}],\\\"websiteSummary\\\":\\\"## \\\\nTømrerkompagniet ApS\\\\nTømrerkompagniet er en mindre virksomhed, der hele tiden har kunden i fokus. Vi påtager os enhver byggeopgave - intet er hverken for stort eller småt.\\\\nVi leverer et veludført arbejde til den aftalte tid og til konkurrencedygtige priser.\\\\nVi håber, at hjemmesiden kan hjælpe dig med at finde inspiration og svar på dine spørgsmål.\\\\nDu er selvfølgelig velkommen til at ringe eller sende en e-mail til os.\\\\nVi glæder os til at høre fra dig!\\\\nVi udfører alle former for om- og tilbygninger.\\\\nVi hjælper dig med:\\\\nTømrer- og snedkerarbejde\\\\nNybygning\\\\nOmbygning\\\\nBygnings- og tag- renoveringer\\\\nHovedentrepriser\\\\nRestaurering\\\\nVinduer og døre\\\\nVedligeholdelse\\\\n\\\\n## \\\\nPROFIL\\\\nTømrerkompagniet I/S blev etableret i 2005 af Brian Lønborg Poulsen og Thomas Johansen og blev omdannet til ApS i November 2008.\\\\nI starten havde vi til huse i lokaler i Brian Poulsens privatbolig, og senere på Eli Christensens Vej 45, men det blev for trangt hen af vejen.\\\\nBrian og Thomas er barndomsvenner, og har mere eller mindre arbejdet side om side i 25 år. De er begge udlært i det samme firma, hvor de har arbejdet sammen indtil Tømrerkompagniets start.\\\\nDe ser dette som en fordel, da de har samme syn på kvalitet, service og arbejdsmoral. Desuden kender de hinandens styrker og svagheder til mindste detalje. Det betyder at de kan supplere hinanden og derved ALTID nå det bedste resultat.\\\\n\\\\n## \\\\nMÅLSÆTNING\\\\nHelt fra det tidspunkt drømmen om eget firma blev skabt hos Thomas og Brian, har det stået klart, at det ikke bare skulle være endnu et tømrerfirma.\\\\nAlle tømrer kan rejse spær, lægge tage, sætte vinduer og døre i osv. Det er nøjagtig det samme som Tømrerkompagniet kan.\\\\nMen de vil noget mere. Kunden skal have en totaloplevelse hos Tømrerkompagniet. Thomas og Brian siger om Tømrerkompagniet. Vi ønsker vores firma skal skille sig ud fra andre, på tre specifikke punkter.\\\\nBedre kvalitet\\\\nHøjere serviceniveau\\\\nstærkere commitment mellem firmaet og kunden.\\\\nDet betyder at alle vores kunder kan være sikre på at når vi sætter tid af til dem, så har vi fuld fokus på deres projekt. Vi garanterer, at vores arbejde er kvalitetsmæssigt i top. Vores kunder kan være sikre på at tidsplanen bliver fuldt, og arbejdsstedet bliver forladt i ordentlig stand.\\\\nMange kunder tror det er en selvfølge, men alt for tit bliver de skuffede. Vi ønsker at sætte prikken over i'et og yde den ekstra indsats, så alle parter er tilfredse.\\\\n\\\\n## \\\\nGALLERI\\\\n\\\\n## \\\\nNY TAGETAGE\\\\nNy tagetage 1\\\\nNy tagetage 2\\\\nNy tagetage 3\\\\nNy tagetage 4\\\\nNy tagetage 5\\\\nNy tagetage 6\\\\nNy tagetage 7\\\\nNy tagetage 8\\\\nNy tagetage 9\\\\nNy tagetage 10\\\\nNy tagetage 11\\\\nNy tagetage 12\\\\nNy tagetage 13\\\\nNy tagetage 14\\\\nNy tagetage 15\\\\n\\\\n## \\\\nRENOVERING AF TAG\\\\nRenovering af tag 1\\\\nRenovering af tag 2\\\\nRenovering af tag 3\\\\nRenovering af tag 4\\\\n\\\\n## \\\\nNYT RENOVATIONSHUS\\\\nNyt renovationshus 1\\\\nNyt renovationshus 2\\\\nNyt renovationshus 3\\\\nNyt renovationshus 4\\\\n\\\\n