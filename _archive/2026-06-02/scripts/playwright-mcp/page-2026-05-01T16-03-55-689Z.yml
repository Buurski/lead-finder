\":\"Google Maps\",\"website\":\"http://www.michalski.dk/\",\"websiteStatus\":\"ok\",\"status\":\"new\",\"notes\":\"\",\"lastUpdated\":\"2026-04-28T22:20:55.890Z\",\"websiteQualityTier\":\"modern\",\"enrichedInfo\":\"\",\"email\":\"michalski@michalski.dk\",\"emailSentAt\":\"\",\"emailOpenedAt\":\"\",\"emailClickedAt\":\"\",\"emailStatus\":\"\",\"followupSentAt\":\"\"},{\"id\":\"52\",\"name\":\"Aage Andersen & Sønner A/S\",\"branch\":\"VVS-installatør\",\"phone\":\"+45 97 15 19 33\",\"city\":\"Ikast\",\"score\":27,\"source\":\"Google Maps\",\"website\":\"http://www.aageandersen-vvs.dk/\",\"websiteStatus\":\"ok\",\"status\":\"new\",\"notes\":\"\",\"lastUpdated\":\"2026-04-28T22:20:55.890Z\",\"websiteQualityTier\":\"modern\",\"enrichedInfo\":\"\",\"email\":\"mail@aageandersenvvs.dk\",\"emailSentAt\":\"\",\"emailOpenedAt\":\"\",\"emailClickedAt\":\"\",\"emailStatus\":\"\",\"followupSentAt\":\"\"},{\"id\":\"53\",\"name\":\"Ikast Jern & Stål A/S\",\"branch\":\"VVS-installatør\",\"phone\":\"+45 97 15 57 00\",\"city\":\"Ikast\",\"score\":33,\"source\":\"Google Maps\",\"website\":\"http://www.ijs-as.dk/\",\"websiteStatus\":\"ok\",\"status\":\"new\",\"notes\":\"\",\"lastUpdated\":\"2026-04-28T22:20:55.890Z\",\"websiteQualityTier\":\"modern\",\"enrichedInfo\":\"\",\"email\":\"\",\"emailSentAt\":\"\",\"emailOpenedAt\":\"\",\"emailClickedAt\":\"\",\"emailStatus\":\"\",\"followupSentAt\":\"\"},{\"id\":\"54\",\"name\":\"BK VVS Mester ApS\",\"branch\":\"VVS-installatør\",\"phone\":\"+45 97 15 23 63\",\"city\":\"Ikast\",\"score\":56,\"source\":\"Google Maps\",\"website\":\"https://www.bkvvs.dk/\",\"websiteStatus\":\"ok\",\"status\":\"new\",\"notes\":\"\",\"lastUpdated\":\"2026-04-28T22:20:55.890Z\",\"websiteQualityTier\":\"mediocre\",\"enrichedInfo\":\"\",\"email\":\"support@grouponline.dk\",\"emailSentAt\":\"\",\"emailOpenedAt\":\"\",\"emailClickedAt\":\"\",\"emailStatus\":\"\",\"followupSentAt\":\"\"},{\"id\":\"55\",\"name\":\"Midtvest-EL A/S\",\"branch\":\"Elektriker\",\"phone\":\"+45 96 60 00 16\",\"city\":\"Ikast\",\"score\":63,\"source\":\"Google Maps\",\"website\":\"http://www.midtvest-el.dk/\",\"websiteStatus\":\"ok\",\"status\":\"client\",\"notes\":\"\",\"lastUpdated\":\"2026-04-28T23:34:31.684Z\",\"websiteQualityTier\":\"mediocre\",\"enrichedInfo\":\"{\\\"fetchedAt\\\":\\\"2026-04-29T10:52:07.399Z\\\",\\\"businessName\\\":\\\"Midtvest-EL A/S\\\",\\\"branch\\\":\\\"Elektriker\\\",\\\"city\\\":\\\"Ikast\\\",\\\"website\\\":\\\"http://www.midtvest-el.dk/\\\",\\\"websitePages\\\":[{\\\"url\\\":\\\"http://www.midtvest-el.dk/\\\",\\\"title\\\":\\\"\\\",\\\"text\\\":\\\"Midtvest-El A/S – Din lokale Elinstallatør og Elektriker i Ikast & Herning |\\\\nVi udføre alt inden for elinstallationer, lige fra nybyg til renovering til optimering og modanisering af eksisterende installationer\\\\nDet rette lys til dette rette formål er altafgørende for en god oplevelse af et rum.\\\\nDet er vigtigt, at man rådfører sig med en dygtig og erfaren belysningstekniker allerede under planlægningen af et projekt. Vi har et stærkt team af erfarne belysningseksperter i ryggen, der garanterer dig den rette belysning. Udover dygtige og erfarne teknikere, har vi store landsdækkende leverandører, som sikrer vores kunder kvalitetsprodukter. Kvaliteten er kendetegnet ved både armaturer såvel som øvrige lyskilder.\\\\nHerudover har vi fokus på udviklingen indenfor lyskilder. Her er det pt. udviklingen inden for LED, der går utrolig hurtigt. Vi holder os naturligvis opdaterede på alle punkter og LED specifikt, således vi kan sikre os, at vores kunder altid får de nyeste og bedste produkter.\\\\nVi servicerer en del af industrien i Herning og Ikast og har gjort det i mange år. I de år har vi lagt stor vægt på at løse problemet hurtigst muligt, så vi kan få maskinen eller produktionen hurtigt tilbage i drift igen. Det er dyrt for en industrikunde at stå stille, hvorfor det netop er vigtigt, at vi er hos kunden med det samme og har kompetencerne til at få rettet fejlen hurtigt. Vi har mere end 25 års erfaring med industri service.\\\\nHos Midtvest-El har vi i tidens løb hjulpet flere af vores kunder, som har lidt af indbrud eller hærværk med at få stoppet problemerne ved hjælp af videoovervågning. Med videoovervågning sender man et effektivt signal om, at ubudne gæster ikke er velkomne, samt at disse vil blive opdaget. Videoovervågning har ikke mindst en høj præventiv og afskrækkende virkning på kriminelle.\\\\nSenest har vi leveret videoovervågning til Ikast Genbrugsplads.\\\"},{\\\"url\\\":\\\"https://midtvest-el.dk/\\\",\\\"title\\\":\\\"\\\",\\\"text\\\":\\\"Midtvest-El A/S – Din lokale Elinstallatør og Elektriker i Ikast & Herning |\\\\nVi udføre alt inden for elinstallationer, lige fra nybyg til renovering til optimering og modanisering af eksisterende installationer\\\\nDet rette lys til dette rette formål er altafgørende for en god oplevelse af et rum.\\\\nDet er vigtigt, at man rådfører sig med en dygtig og erfaren belysningstekniker allerede under planlægningen af et projekt. Vi har et stærkt team af erfarne belysningseksperter i ryggen, der garanterer dig den rette belysning. Udover dygtige og erfarne teknikere, har vi store landsdækkende leverandører, som sikrer vores kunder kvalitetsprodukter. Kvaliteten er kendetegnet ved både armaturer såvel som øvrige lyskilder.\\\\nHerudover har vi fokus på udviklingen indenfor lyskilder. Her er det pt. udviklingen inden for LED, der går utrolig hurtigt. Vi holder os naturligvis opdaterede på alle punkter og LED specifikt, således vi kan sikre os, at vores kunder altid får de nyeste og bedste produkter.\\\\nVi servicerer en del af industrien i Herning og Ikast og har gjort det i mange år. I de år har vi lagt stor vægt på at løse problemet hurtigst muligt, så vi kan få maskinen eller produktionen hurtigt tilbage i drift igen. Det er dyrt for en industrikunde at stå stille, hvorfor det netop er vigtigt, at vi er hos kunden med det samme og har kompetencerne til at få rettet fejlen hurtigt. Vi har mere end 25 års erfaring med industri service.\\\\nHos Midtvest-El har vi i tidens løb hjulpet flere af vores kunder, som har lidt af indbrud eller hærværk med at få stoppet problemerne ved hjælp af videoovervågning. Med videoovervågning sender man et effektivt signal om, at ubudne gæster ikke er velkomne, samt at disse vil blive opdaget. Videoovervågning har ikke mindst en høj præventiv og afskrækkende virkning på kriminelle.\\\\nSenest har vi leveret videoovervågning til Ikast Genbrugsplads.\\\"},{\\\"url\\\":\\\"https://midtvest-el.dk/profil/\\\",\\\"title\\\":\\\"\\\",\\\"text\\\":\\\"Historien om Midtvest-El A/S | Midtvest-El A/S – Din lokale Elinstallatør og Elektriker i Ikast & Herning\\\\nMidtvest-El A/S har sine rødder helt tilbage til 1987, hvor Elinstallatør Flemming Bønding startede sin enkeltmands virksomhed ”Flemming Bønding El”, Flemming Bønding drev sin enkeltmands virksomhed fra et lille privat lager lidt uden for Ikast by. Flemming drev virksomheden ved egen hånd og har i tidens løb haft ansat en hjælpende hånd, når det gik stærkt. Flemming udlærte også en lærling i hans virksomhed.\\\\nEfter en lang årrække, hvor Flemming havde drevet virksomhed på egen hånd og var kommet godt op i årene, valgte han at takke ja til et par hjælpende hænder.\\\\nDe hjælpende hænder kom fra Boye Christensen, Preben Josefsen og Leif Andersen, som alle er erfarne Elektrikere og El tekniker, med speciale i maskin- og industri installationer.\\\"},{\\\"url\\\":\\\"https://midtvest-el.dk/vi-tilbyder/el-installation/\\\",\\\"title\\\":\\\"\\\",\\\"text\\\":\\\"Installation | Midtvest-El A/S – Din lokale Elinstallatør og Elektriker i Ikast & Herning\\\\nVi udføre alt inden for elinstallationer, lige fra nybyg til renovering til optimering og modanisering af eksisterende installationer\\\"},{\\\"url\\\":\\\"https://midtvest-el.dk/vi-tilbyder/\\\",\\\"title\\\":\\\"\\\",\\\"text\\\":\\\"Midtvest-El A/S – Din lokale Elinstallatør og Elektriker i Ikast & Herning\\\\nVi tilbyder\\\\nVi tilbyder stort set alle former for el-installationer.\\\\nHos os er du sikret en god service til en god pris.\\\\nHer ser du nogle af de mange services vi tilbyder.\\\"},{\\\"url\\\":\\\"https://midtvest-el.dk/vi-tilbyder/el-eftersyn/\\\",\\\"title\\\":\\\"\\\",\\\"text\\\":\\\"eftersyn | Midtvest-El A/S – Din lokale Elinstallatør og Elektriker i Ikast & Herning\\\\nSikkerhedsstyrelsen har indført et nyt system, som skal sikre bedre elsikkerhed i de danske hjem.\\\\nFra 1. maj 2012 er det obligatorisk at få lavet et el-eftersyn, hvis man vil tegne en ejerskifteforsikring ved hushandel.\\\\nDet er ikke længere nok, hvis man som sælger af et hus ønsker at tegne en ejerskifteforsikring, at få lavet en tilstandsrapport af en byggesagkyndig. Det er fra 1. maj 2012 også lovpligtigt, at man får udført et el-eftersyn af en autoriseret elinstallatør for at kunne tegne denne. El-eftersynet er dermed blevet afgørende for, at sælger kan fraskrive sig ansvaret for eventuelt ulovlige installationer i det solgte hus.\\\\nDet er frivilligt, om man som el-installatør vil tilslutte sig ordningen om at være eleftersyns-autoriseret. Vi har tilmeldt os for at kunne servicere vores kunder i alle henseender.\\\\nPriserne for eftersynene er udarbejdet af Sikkerhedsstyrelsen i form af max beløb i forhold til husets størrelse og alder. Priserne er listet op her under\\\\nFaktaboks: Priser på eleftersyn\\\\nDe oplyste priser er fastsat pr. 1. maj 2012 og indeholder udgifter til kørsel, forsikring med videre.\\\\n”Hovedhus” opført før 2001\\\\n• Under 100 m2: DKK 1952,- inkl. moms\\\\n• 100 – 199 m2: DKK 2577,- inkl. moms\\\\n• 200 – 299 m2: DKK 3327,- inkl. moms\\\\n”Hovedhus” opført 2001 eller senere\\\\n• Under 100 m2: DKK 1577,- inkl. moms\\\\n• 100 – 199 m2: DKK 2077,- inkl. moms\\\\n• 199 – 299 m2: DKK 2702,- inkl. moms\\\\nFor større huse og andre bygninger, herunder fælleseje og fællesfaciliteter i ejerlejlighedskomplekser, aftales prisen separat.\\\"},{\\\"url\\\":